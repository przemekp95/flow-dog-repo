name: CI

on:
    push:
    pull_request:

env:
    PHP_VERSION: '8.4.20'

jobs:
    qa:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  coverage: none

            - name: Assert PHP version line
              run: php -r "if (PHP_VERSION_ID !== 80420) { fwrite(STDERR, 'Expected PHP 8.4.20, got '.PHP_VERSION.PHP_EOL); exit(1);} echo 'Using PHP '.PHP_VERSION.PHP_EOL;"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Validate Composer
              run: composer validate --strict

            - name: Install PHP dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Install Node dependencies
              run: npm ci

            - name: Run PHPUnit
              run: php bin/phpunit

            - name: Run PHPStan
              run: php vendor/bin/phpstan analyse --memory-limit=1G

            - name: Run PHP CS Fixer
              run: php vendor/bin/php-cs-fixer fix --dry-run --diff --verbose

            - name: Run Deptrac
              run: php vendor/bin/deptrac analyse --no-progress

            - name: Run Prettier
              run: npm run format:check

            - name: Run Composer audit
              run: composer audit

            - name: Build Docker runtime image
              run: docker build --pull --target runtime -t flowdog-order-api:ci .

            - name: Assert runtime image defaults to prod and excludes dev-only files
              run: |
                  docker run --rm flowdog-order-api:ci sh -lc '
                    [ "$APP_ENV" = "prod" ] &&
                    [ "$APP_DEBUG" = "0" ] &&
                    [ ! -e /app/.env ] &&
                    [ ! -e /app/vendor/bin/phpunit ] &&
                    [ ! -d /app/vendor/bin ] &&
                    [ ! -d /app/vendor/nelmio/api-doc-bundle/public ] &&
                    [ -d /app/templates ] &&
                    [ -z "$(ls -A /app/templates)" ] &&
                    [ ! -d /app/tests ] &&
                    [ ! -d /app/docs ] &&
                    [ ! -d /app/public/bundles/nelmioapidoc/redocly ] &&
                    [ ! -d /app/public/bundles/nelmioapidoc/scalar ] &&
                    [ ! -d /app/public/bundles/nelmioapidoc/stoplight ] &&
                    [ ! -e /app/public/bundles/nelmioapidoc/init-redocly-ui.js ] &&
                    [ ! -e /app/public/bundles/nelmioapidoc/swagger-ui/swagger-ui-bundle.js.map ] &&
                    [ ! -e /app/public/bundles/nelmioapidoc/swagger-ui/swagger-ui-standalone-preset.js.map ] &&
                    [ ! -e /app/public/bundles/nelmioapidoc/swagger-ui/swagger-ui.css.map ] &&
                    [ -d /app/var/cache/prod ]
                  '

            - name: Smoke test Docker image
              run: |
                  bash scripts/docker_smoke_test.sh \
                    --image flowdog-order-api:ci \
                    --host-port 18080 \
                    --app-env prod \
                    --app-secret ci-secret-not-for-production \
                    --openapi-output /tmp/openapi.json

            - name: Trivy filesystem scan
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  scan-ref: .
                  skip-dirs: vendor,node_modules,var,public/bundles
                  vuln-type: os,library
                  scanners: vuln,secret,misconfig
                  severity: HIGH,CRITICAL
                  exit-code: '1'

            - name: Trivy image scan
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  image-ref: flowdog-order-api:ci
                  severity: HIGH,CRITICAL
                  exit-code: '1'
                  skip-setup-trivy: true
